<!DOCTYPE html>
<html>
<head>
  <title>Earnings Distribution</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f3f3f3;
    }
    h2 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover {
      background-color: #0056b3;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    th {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <h2>Earnings Distribution</h2>
  <button onclick="fetchEarnings()">Fetch Earnings Distribution</button>

  <table id="earningsTable" style="display:none;">
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>MCQ Name</th>
        <th>Entry Fee</th>
        <th>Percentage</th>
        <th>Correct</th>
        <th>Wrong</th>
        <th>Neg. Deduction</th>
        <th>User Earning</th>
        <th>Admin Earning</th>
        <th>Rank</th>
        <th>Submitted At</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
<script>
    // Redirect to index.html if admin is not logged in
    window.onload = function () {
      const isAdminLoggedIn = sessionStorage.getItem('adminLoggedIn');
      if (isAdminLoggedIn !== 'true') {
        window.location.href = '../index.html';
      }
    };
  </script> 
  <script>
    async function fetchEarnings() {
      try {
        const res = await fetch('https://gameappbackend-i8zv.onrender.com/api/testsubmissions/calculate-earnings');
        const data = await res.json();

        if (data.success && data.distribution.length > 0) {
          const table = document.getElementById('earningsTable');
          const tbody = document.getElementById('tableBody');
          tbody.innerHTML = '';

          data.distribution.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${item.username}</td>
              <td>${item.email}</td>
              <td>${item.mcqName}</td>
              <td>${item.entryFee}</td>
              <td>${item.percentage}</td>
              <td>${item.correctAnswers}</td>
              <td>${item.wrongAnswers}</td>
              <td>${item.negativeMarkDeduction}</td>
              <td>${item.userEarning}</td>
              <td>${item.adminEarning}</td>
              <td>${item.rank}</td>
              <td>${new Date(item.submittedAt).toLocaleString()}</td>
            `;
            tbody.appendChild(row);
          });

          table.style.display = 'table';
        } else {
          alert(data.message || 'No earnings distribution found');
        }
      } catch (error) {
        console.error('Error fetching data:', error);
        alert('Failed to fetch data from server.');
      }
    }
  </script>

</body>
</html>
