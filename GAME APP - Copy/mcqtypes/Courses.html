<!DOCTYPE html>
<html>
<head>
  <title>Course Modules</title>
</head>
<body>

<h1 id="courseTitle"></h1>
<div id="moduleContainer"></div>

<script>

const API_BASE = "http://localhost:5000/api/agent";

const urlParams = new URLSearchParams(window.location.search);
const courseId = urlParams.get("courseId");

async function loadModules() {

  const res = await fetch(`${API_BASE}/modules/course/${courseId}`);
  const modules = await res.json();

  const container = document.getElementById("moduleContainer");

  if (!Array.isArray(modules) || modules.length === 0) {
    container.innerHTML = "<p>No modules found.</p>";
    return;
  }

  modules.forEach(module => {

    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${module.title}</h3>
      <p>Concept: ${module.conceptTag}</p>
      <p>Difficulty: ${module.difficulty}</p>
      <video width="400" controls>
        <source src="${module.videoUrl}" type="video/mp4">
      </video>
      <hr>
    `;

    container.appendChild(div);
  });
}

loadModules();

</script>

</body>
</html>
