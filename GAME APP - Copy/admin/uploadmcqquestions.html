<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Question Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-xl shadow-lg mb-8 p-6 relative">
      <button onclick="window.history.back()" class="absolute left-6 top-6 bg-white/10 hover:bg-white/20 p-2 rounded-full transition duration-200">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="flex justify-between items-center">
        <div class="ml-10">
          <h1 class="text-3xl font-bold">MCQ Question Manager</h1>
          <p class="text-blue-100 mt-1">Create, manage, and filter multiple-choice questions</p>
        </div>
        <div class="bg-white/10 p-3 rounded-lg">
          <i class="fas fa-question-circle text-2xl"></i>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Create MCQ Form -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
          <div class="bg-gradient-to-r from-blue-500 to-blue-600 px-6 py-4">
            <h2 class="text-xl font-semibold text-white">Create New MCQ</h2>
          </div>
          <div class="p-6">
            <form id="mcqForm" class="space-y-4">
              <div>
                <label for="mcqTypeId" class="block text-sm font-medium text-gray-700 mb-1">MCQ Type ID</label>
                <input type="text" id="mcqTypeId" placeholder="e.g., MATH-101" required
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              </div>
              
              <div>
                <label for="question" class="block text-sm font-medium text-gray-700 mb-1">Question</label>
                <textarea id="question" rows="3" placeholder="Enter the question" required
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
              </div>
              
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="optionA" class="block text-sm font-medium text-gray-700 mb-1">Option A</label>
                  <input type="text" id="optionA" placeholder="Option A" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                  <label for="optionB" class="block text-sm font-medium text-gray-700 mb-1">Option B</label>
                  <input type="text" id="optionB" placeholder="Option B" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                  <label for="optionC" class="block text-sm font-medium text-gray-700 mb-1">Option C</label>
                  <input type="text" id="optionC" placeholder="Option C" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                  <label for="optionD" class="block text-sm font-medium text-gray-700 mb-1">Option D</label>
                  <input type="text" id="optionD" placeholder="Option D" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
              </div>
              
              <div>
                <label for="answer" class="block text-sm font-medium text-gray-700 mb-1">Correct Answer</label>
                <select id="answer" required
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                  <option value="">Select Answer</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                  <option value="D">D</option>
                </select>
              </div>
              
              <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <i class="fas fa-plus-circle mr-2"></i> Create MCQ
              </button>
            </form>
          </div>
        </div>

        <!-- Dashboard Section -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden mt-6">
          <div class="bg-gradient-to-r from-purple-500 to-purple-600 px-6 py-4">
            <h2 class="text-xl font-semibold text-white">MCQ Dashboard</h2>
          </div>
          <div class="p-6">
            <div class="grid grid-cols-1 gap-4">
              <div class="bg-blue-50 rounded-lg p-4">
                <div class="flex items-center">
                  <div class="bg-blue-100 p-3 rounded-full mr-4">
                    <i class="fas fa-clipboard-list text-blue-600 text-xl"></i>
                  </div>
                  <div>
                    <p class="text-sm text-gray-600">Total Questions</p>
                    <h3 id="totalMcqs" class="text-2xl font-bold text-gray-800">0</h3>
                  </div>
                </div>
              </div>
              
              <div class="bg-green-50 rounded-lg p-4">
                <div class="flex items-center">
                  <div class="bg-green-100 p-3 rounded-full mr-4">
                    <i class="fas fa-tags text-green-600 text-xl"></i>
                  </div>
                  <div>
                    <p class="text-sm text-gray-600">Unique Types</p>
                    <h3 id="uniqueTypes" class="text-2xl font-bold text-gray-800">0</h3>
                  </div>
                </div>
              </div>
              
              <div class="bg-indigo-50 rounded-lg p-4">
                <div class="flex items-center">
                  <div class="bg-indigo-100 p-3 rounded-full mr-4">
                    <i class="fas fa-chart-pie text-indigo-600 text-xl"></i>
                  </div>
                  <div>
                    <p class="text-sm text-gray-600">Top Type</p>
                    <h3 id="topType" class="text-xl font-bold text-gray-800 truncate">-</h3>
                    <p id="topTypeCount" class="text-sm text-gray-600">0 questions</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- MCQ List Section -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
          <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 px-6 py-4">
            <h2 class="text-xl font-semibold text-white">MCQ Questions</h2>
          </div>
          <div class="p-6">
            <!-- Filter Controls -->
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
              <div class="flex-1">
                <label for="filterTypeId" class="sr-only">Filter by Type ID</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-filter text-gray-400"></i>
                  </div>
                  <input type="text" id="filterTypeId" placeholder="Enter MCQ Type ID to filter"
                    class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
              </div>
              <button onclick="loadMcqsByType(document.getElementById('filterTypeId').value)"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <i class="fas fa-search mr-2"></i> Filter
              </button>
              <button onclick="loadMcqs()"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <i class="fas fa-sync-alt mr-2"></i> Show All
              </button>
              <button onclick="downloadExcel()" 
                  class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                  <i class="fas fa-file-excel mr-2"></i> Export to Excel
              </button>

              <button onclick="downloadPDF()" 
                  class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                 <i class="fas fa-file-pdf mr-2"></i> Export PDF
               </button>
            </div>

            <!-- MCQ List -->
            <div id="mcqList" class="space-y-4">
              <!-- MCQs will be loaded here dynamically -->
              <div class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Loading questions...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function getCurrentMCQs() {
  const filterTypeId = document.getElementById('filterTypeId').value;
  if (filterTypeId) {
    const res = await fetch(`${apiUrl}/mcqquestion/${filterTypeId}`);
    return await res.json();
  } else {
    const res = await fetch(`${apiUrl}/mcq-questions`);
    return await res.json();
  }
}

// Excel (CSV) Download
async function downloadExcel() {
  try {
    const btn = document.querySelector('[onclick="downloadExcel()"]');
    const originalBtnText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Preparing Excel...';
    btn.disabled = true;

    const mcqs = await getCurrentMCQs();

    if (!Array.isArray(mcqs) || mcqs.length === 0) {
      showNotification('No questions found to export', 'warning');
      return;
    }

    // Create CSV content
    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "Type ID,Question,Option A,Option B,Option C,Option D,Correct Answer\n";
    
    mcqs.forEach(mcq => {
      const row = [
        `"${mcq.mcqTypeId}"`,
        `"${mcq.question.replace(/"/g, '""')}"`,
        `"${mcq.options.A.replace(/"/g, '""')}"`,
        `"${mcq.options.B.replace(/"/g, '""')}"`,
        `"${mcq.options.C.replace(/"/g, '""')}"`,
        `"${mcq.options.D.replace(/"/g, '""')}"`,
        mcq.answer
      ].join(",");
      csvContent += row + "\n";
    });

    // Trigger download
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `MCQs_${filterTypeId || 'All'}_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showNotification('Excel file downloaded successfully!', 'success');
  } catch (err) {
    console.error(err);
    showNotification('Error generating Excel file', 'error');
  } finally {
    const btn = document.querySelector('[onclick="downloadExcel()"]');
    btn.innerHTML = '<i class="fas fa-file-excel mr-2"></i> Export Excel';
    btn.disabled = false;
  }
}

// PDF Download
async function downloadPDF() {
  try {
    const btn = document.querySelector('[onclick="downloadPDF()"]');
    const originalBtnText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Preparing PDF...';
    btn.disabled = true;

    // Get filter values
    const filterTypeId = document.getElementById('filterTypeId').value;
    
    // Fetch filtered MCQs
    let mcqs;
    if (filterTypeId) {
      const response = await fetch(`${apiUrl}/mcqquestion/${filterTypeId}`);
      mcqs = await response.json();
    } else {
      const response = await fetch(`${apiUrl}/mcq-questions`);
      mcqs = await response.json();
    }

    if (!Array.isArray(mcqs) || mcqs.length === 0) {
      showNotification('No questions found to export', 'warning');
      return;
    }

    // Load jsPDF library dynamically
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload = async () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // PDF styling constants
      const titleFontSize = 16;
      const headerFontSize = 12;
      const questionFontSize = 11;
      const optionFontSize = 10;
      const leftMargin = 14;
      const optionIndent = 20;
      const rightMargin = 200;
      const lineHeight = 7;
      const pageHeight = 280;

      // Add title with filter info
      doc.setFontSize(titleFontSize);
      doc.setFont('helvetica', 'bold');
      doc.text('MCQ Questions Report', leftMargin, 15);
      
      doc.setFontSize(headerFontSize);
      doc.setFont('helvetica', 'normal');
      if (filterTypeId) {
        doc.text(`Filtered by Type: ${filterTypeId}`, leftMargin, 25);
      } else {
        doc.text('All Questions', leftMargin, 25);
      }
      
      // Add metadata
      doc.setFontSize(optionFontSize);
      doc.text(`Generated on: ${new Date().toLocaleString()}`, leftMargin, 35);
      doc.text(`Total Questions: ${mcqs.length}`, rightMargin, 35, null, null, 'right');

      let yPosition = 45;
      let page = 1;
      let questionCount = 1;

      mcqs.forEach(mcq => {
        // Add new page if needed
        if (yPosition > pageHeight) {
          doc.addPage();
          page++;
          yPosition = 20;
          doc.setPage(page);
          doc.setFontSize(optionFontSize);
          doc.text(`Page ${page}`, rightMargin, 10, null, null, 'right');
        }

        // Question number and type
        doc.setFontSize(headerFontSize);
        doc.setFont('helvetica', 'bold');
        doc.text(`Q${questionCount}: [${mcq.mcqTypeId}]`, leftMargin, yPosition);
        yPosition += lineHeight;

        // Question text
        doc.setFontSize(questionFontSize);
        doc.setFont('helvetica', 'normal');
        const questionLines = doc.splitTextToSize(mcq.question, 180);
        doc.text(questionLines, leftMargin, yPosition);
        yPosition += (questionLines.length * lineHeight) + 5;

        // Options
        doc.setFontSize(optionFontSize);
        ['A', 'B', 'C', 'D'].forEach(opt => {
          const isCorrect = mcq.answer === opt;
          
          // Set color for correct answer
          if (isCorrect) {
            doc.setTextColor(0, 128, 0); // Green
            doc.setFont('helvetica', 'bold');
          } else {
            doc.setTextColor(0); // Black
            doc.setFont('helvetica', 'normal');
          }
          
          const optionText = `${opt}) ${mcq.options[opt]}`;
          const optionLines = doc.splitTextToSize(optionText, 170);
          
          optionLines.forEach(line => {
            doc.text(line, optionIndent, yPosition);
            yPosition += lineHeight;
          });
          
          // Reset styling
          doc.setTextColor(0);
          doc.setFont('helvetica', 'normal');
        });

        // Space between questions
        yPosition += 10;
        questionCount++;
      });

      // Save the PDF
      const fileName = `MCQs_${filterTypeId || 'All'}_${new Date().toISOString().slice(0,10)}.pdf`;
      doc.save(fileName);
      showNotification('PDF file downloaded successfully!', 'success');
    };
    
    document.body.appendChild(script);
  } catch (err) {
    console.error(err);
    showNotification('Error generating PDF file', 'error');
  } finally {
    const btn = document.querySelector('[onclick="downloadPDF()"]');
    btn.innerHTML = '<i class="fas fa-file-pdf mr-2"></i> Export PDF';
    btn.disabled = false;
  }
}
    const apiUrl = 'https://gameappbackend-i8zv.onrender.com/api/mcqquestion';

    // Global variables for dashboard
    let totalQuestions = 0;
    let mcqTypeCounts = {};
    let uniqueTypes = 0;

    // CREATE
    document.getElementById('mcqForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Creating...';
      submitBtn.disabled = true;
      
      const data = {
        mcqTypeId: document.getElementById('mcqTypeId').value,
        question: document.getElementById('question').value,
        options: {
          A: document.getElementById('optionA').value,
          B: document.getElementById('optionB').value,
          C: document.getElementById('optionC').value,
          D: document.getElementById('optionD').value
        },
        answer: document.getElementById('answer').value
      };

      try {
        const res = await fetch(`${apiUrl}/mcq-questions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          showNotification('MCQ created successfully!', 'success');
          document.getElementById('mcqForm').reset();
          loadMcqs();
          updateDashboard();
        } else {
          const errorData = await res.json();
          showNotification(errorData.message || 'Error creating MCQ', 'error');
        }
      } catch (err) {
        console.error(err);
        showNotification('Server error. Please try again.', 'error');
      } finally {
        submitBtn.innerHTML = originalBtnText;
        submitBtn.disabled = false;
      }
    });

    // READ (All MCQs)
    async function loadMcqs() {
      const mcqList = document.getElementById('mcqList');
      mcqList.innerHTML = `
        <div class="text-center py-8 text-gray-500">
          <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
          <p>Loading questions...</p>
        </div>
      `;
      
      try {
        const res = await fetch(`${apiUrl}/mcq-questions`);
        const mcqs = await res.json();
        
        if (!Array.isArray(mcqs)) {
          mcqList.innerHTML = `
            <div class="text-center py-8 text-red-500">
              <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
              <p>Error loading questions. Invalid data format.</p>
            </div>
          `;
          return;
        }

        // Update global counts
        totalQuestions = mcqs.length;
        mcqTypeCounts = {};
        mcqs.forEach(mcq => {
          mcqTypeCounts[mcq.mcqTypeId] = (mcqTypeCounts[mcq.mcqTypeId] || 0) + 1;
        });
        uniqueTypes = Object.keys(mcqTypeCounts).length;
        
        if (mcqs.length === 0) {
          mcqList.innerHTML = `
            <div class="text-center py-8 text-gray-500">
              <i class="fas fa-inbox text-2xl mb-2"></i>
              <p>No MCQs found. Create your first MCQ!</p>
            </div>
          `;
          updateDashboard();
          return;
        }
        
        mcqList.innerHTML = '';
        mcqs.forEach(mcq => {
          const mcqCard = document.createElement('div');
          mcqCard.className = 'bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition duration-200';
          mcqCard.innerHTML = `
            <div class="p-5">
              <div class="flex justify-between items-start">
                <div>
                  <span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">
                    ${mcq.mcqTypeId}
                  </span>
                  <h3 class="text-lg font-medium text-gray-900 mt-2">${mcq.question}</h3>
                </div>
                <span class="inline-flex items-center bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full ml-2">
                  <span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span>
                  Active
                </span>
              </div>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                <div class="flex items-center ${mcq.answer === 'A' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'A' ? 'text-green-800' : 'text-gray-800'} mr-2">A:</span>
                  <span>${mcq.options.A}</span>
                  ${mcq.answer === 'A' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'B' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'B' ? 'text-green-800' : 'text-gray-800'} mr-2">B:</span>
                  <span>${mcq.options.B}</span>
                  ${mcq.answer === 'B' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'C' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'C' ? 'text-green-800' : 'text-gray-800'} mr-2">C:</span>
                  <span>${mcq.options.C}</span>
                  ${mcq.answer === 'C' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'D' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'D' ? 'text-green-800' : 'text-gray-800'} mr-2">D:</span>
                  <span>${mcq.options.D}</span>
                  ${mcq.answer === 'D' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
              </div>
              
              <div class="flex justify-end space-x-2 mt-4">
                <button onclick="editMcq('${mcq._id}')" class="text-blue-600 hover:text-blue-800 font-medium text-sm px-3 py-1 rounded hover:bg-blue-50 transition duration-200">
                  <i class="fas fa-edit mr-1"></i> Edit
                </button>
                <button onclick="deleteMcq('${mcq._id}')" class="text-red-600 hover:text-red-800 font-medium text-sm px-3 py-1 rounded hover:bg-red-50 transition duration-200">
                  <i class="fas fa-trash-alt mr-1"></i> Delete
                </button>
              </div>
            </div>
          `;
          mcqList.appendChild(mcqCard);
        });

        updateDashboard();
      } catch (err) {
        console.error(err);
        mcqList.innerHTML = `
          <div class="text-center py-8 text-red-500">
            <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
            <p>Error loading questions. Please try again.</p>
          </div>
        `;
      }
    }

    // Update dashboard with counts
    function updateDashboard() {
      document.getElementById('totalMcqs').textContent = totalQuestions;
      document.getElementById('uniqueTypes').textContent = uniqueTypes;
      
      // Find the type with most questions
      let topType = '';
      let topCount = 0;
      for (const [type, count] of Object.entries(mcqTypeCounts)) {
        if (count > topCount) {
          topType = type;
          topCount = count;
        }
      }
      
      document.getElementById('topType').textContent = topType || '-';
      document.getElementById('topTypeCount').textContent = topCount ? `${topCount} questions` : '-';
    }

    // Filter by Type ID
    async function loadMcqsByType(mcqTypeId) {
      if (!mcqTypeId) {
        showNotification('Please enter a Type ID to filter', 'warning');
        return;
      }

      const mcqList = document.getElementById('mcqList');
      mcqList.innerHTML = `
        <div class="text-center py-8 text-gray-500">
          <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
          <p>Filtering questions...</p>
        </div>
      `;

      try {
        const res = await fetch(`${apiUrl}/mcqquestion/${mcqTypeId}`);
        const mcqs = await res.json();

        mcqList.innerHTML = `
          <div class="mb-4 flex items-center">
            <h3 class="text-lg font-medium text-gray-900">MCQs for Type ID: ${mcqTypeId}</h3>
            <button onclick="loadMcqs()" class="ml-auto text-sm text-blue-600 hover:text-blue-800 flex items-center">
              <i class="fas fa-times mr-1"></i> Clear filter
            </button>
          </div>
        `;

        if (!Array.isArray(mcqs) || mcqs.length === 0) {
          mcqList.innerHTML += `
            <div class="text-center py-8 text-gray-500">
              <i class="fas fa-inbox text-2xl mb-2"></i>
              <p>No MCQs found for this type.</p>
            </div>
          `;
          return;
        }

        mcqs.forEach(mcq => {
          const mcqCard = document.createElement('div');
          mcqCard.className = 'bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition duration-200 mb-4';
          mcqCard.innerHTML = `
            <div class="p-5">
              <h3 class="text-lg font-medium text-gray-900">${mcq.question}</h3>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                <div class="flex items-center ${mcq.answer === 'A' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'A' ? 'text-green-800' : 'text-gray-800'} mr-2">A:</span>
                  <span>${mcq.options.A}</span>
                  ${mcq.answer === 'A' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'B' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'B' ? 'text-green-800' : 'text-gray-800'} mr-2">B:</span>
                  <span>${mcq.options.B}</span>
                  ${mcq.answer === 'B' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'C' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'C' ? 'text-green-800' : 'text-gray-800'} mr-2">C:</span>
                  <span>${mcq.options.C}</span>
                  ${mcq.answer === 'C' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
                <div class="flex items-center ${mcq.answer === 'D' ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} p-3 rounded">
                  <span class="font-medium ${mcq.answer === 'D' ? 'text-green-800' : 'text-gray-800'} mr-2">D:</span>
                  <span>${mcq.options.D}</span>
                  ${mcq.answer === 'D' ? '<i class="fas fa-check-circle text-green-500 ml-auto"></i>' : ''}
                </div>
              </div>
              
              <div class="flex justify-end space-x-2 mt-4">
                <button onclick="editMcq('${mcq._id}')" class="text-blue-600 hover:text-blue-800 font-medium text-sm px-3 py-1 rounded hover:bg-blue-50 transition duration-200">
                  <i class="fas fa-edit mr-1"></i> Edit
                </button>
                <button onclick="deleteMcq('${mcq._id}')" class="text-red-600 hover:text-red-800 font-medium text-sm px-3 py-1 rounded hover:bg-red-50 transition duration-200">
                  <i class="fas fa-trash-alt mr-1"></i> Delete
                </button>
              </div>
            </div>
          `;
          mcqList.appendChild(mcqCard);
        });
      } catch (err) {
        console.error('Error fetching MCQs by type:', err);
        mcqList.innerHTML = `
          <div class="text-center py-8 text-red-500">
            <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
            <p>Error loading filtered questions. Please try again.</p>
          </div>
        `;
      }
    }

    // DELETE
    async function deleteMcq(id) {
      const confirmed = await showConfirmDialog(
        'Delete MCQ', 
        'Are you sure you want to delete this MCQ? This action cannot be undone.',
        'Delete',
        'Cancel'
      );
      
      if (!confirmed) return;

      try {
        const res = await fetch(`${apiUrl}/mcq-questions/${id}`, {
          method: 'DELETE'
        });
        
        if (res.ok) {
          showNotification('MCQ deleted successfully!', 'success');
          loadMcqs();
          updateDashboard();
        } else {
          showNotification('Error deleting MCQ', 'error');
        }
      } catch (err) {
        console.error(err);
        showNotification('Server error. Please try again.', 'error');
      }
    }

    // UPDATE
    async function editMcq(id) {
      const { value: newQuestion } = await Swal.fire({
        title: 'Edit Question',
        input: 'textarea',
        inputLabel: 'Enter new question text',
        inputPlaceholder: 'Type the updated question here...',
        showCancelButton: true,
        confirmButtonText: 'Update',
        cancelButtonText: 'Cancel',
        inputValidator: (value) => {
          if (!value) {
            return 'You need to enter a question!';
          }
        }
      });

      if (!newQuestion) return;

      try {
        const res = await fetch(`${apiUrl}/mcqquestion/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: newQuestion })
        });
        
        if (res.ok) {
          showNotification('Question updated successfully!', 'success');
          loadMcqs();
        } else {
          showNotification('Error updating question', 'error');
        }
      } catch (err) {
        console.error(err);
        showNotification('Server error. Please try again.', 'error');
      }
    }

    // Notification function
    function showNotification(message, type = 'info') {
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
      };
      
      toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg flex items-center ${colors[type] || 'bg-blue-500'} animate-fade-in`;
      toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'} mr-2"></i>
        <span>${message}</span>
      `;
      
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.remove('animate-fade-in');
        toast.classList.add('animate-fade-out');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Confirm dialog function
    async function showConfirmDialog(title, text, confirmText, cancelText) {
      return new Promise((resolve) => {
        const dialog = document.createElement('div');
        dialog.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
        dialog.innerHTML = `
          <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 animate-scale-in">
            <h3 class="text-xl font-semibold text-gray-900 mb-2">${title}</h3>
            <p class="text-gray-600 mb-6">${text}</p>
            <div class="flex justify-end space-x-3">
              <button id="cancelBtn" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition duration-200">
                ${cancelText}
              </button>
              <button id="confirmBtn" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition duration-200">
                ${confirmText}
              </button>
            </div>
          </div>
        `;
        
        document.body.appendChild(dialog);
        
        dialog.querySelector('#confirmBtn').addEventListener('click', () => {
          dialog.classList.add('animate-scale-out');
          setTimeout(() => {
            dialog.remove();
            resolve(true);
          }, 200);
        });
        
        dialog.querySelector('#cancelBtn').addEventListener('click', () => {
          dialog.classList.add('animate-scale-out');
          setTimeout(() => {
            dialog.remove();
            resolve(false);
          }, 200);
        });
      });
    }

    // Add some animation styles
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(10px); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes scaleOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.9); }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .animate-fade-out {
        animation: fadeOut 0.3s ease-out forwards;
      }
      .animate-scale-in {
        animation: scaleIn 0.2s ease-out forwards;
      }
      .animate-scale-out {
        animation: scaleOut 0.2s ease-out forwards;
      }
    `;
    document.head.appendChild(style);

    // Load all on page load
    loadMcqs();
  </script>
</body>
</html>
