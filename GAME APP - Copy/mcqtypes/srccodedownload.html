<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Source Code</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .download-box { border: 1px solid #ddd; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
    .btn-download { display: inline-block; margin-top: 15px; padding: 10px 15px; background: #007bff; color: #fff; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Download Source Code</h1>
  <div id="download-container" class="download-box"></div>

  <script>
    const API_BASE = "http://localhost:5000";

    async function fetchSourceCode() {
      const urlParams = new URLSearchParams(window.location.search);
      const sourceCodeId = urlParams.get("sourceCodeId");

      try {
        const res = await fetch(`${API_BASE}/api/sourcecodes/${sourceCodeId}`);
        const code = await res.json();

        const container = document.getElementById("download-container");
        container.innerHTML = `
          <h2>${code.name}</h2>
          <p>${code.description}</p>
          <p><b>Language:</b> ${code.language}</p>
          <a href="data:text/plain;charset=utf-8,${encodeURIComponent(code.srcCode)}" download="${code.name}.txt" class="btn-download">Download Source Code</a>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', fetchSourceCode);
  </script>
</body>
</html>
