<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher MCQ Dashboard</title>
<style>
/* ================= Reset & Fonts ================= */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
body { background: linear-gradient(to right, #e0eafc, #cfdef3); padding: 20px; }

/* ================= Header ================= */
header {
    text-align: center;
    margin-bottom: 30px;
}
header h1 {
    font-size: 2.5rem;
    color: #bec3c9;
    margin-bottom: 10px;
    letter-spacing: 1px;
}
header p {
    font-size: 1.1rem;
    color: #7f8c8d;
}

/* ================= Dashboard Cards ================= */
#dashboard {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    margin-bottom: 30px;
}
.card {
    flex: 1 1 220px;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    padding: 25px 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    transition: all 0.3s;
}
.card:hover {
    transform: translateY(-10px) scale(1.05);
}
.card h2 {
    font-size: 2rem;
    margin-bottom: 10px;
    font-weight: 600;
}
.card p {
    font-size: 1.1rem;
}

/* ================= Filters ================= */
#filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
}
#filters label {
    font-weight: 600;
    color: #34495e;
}
#filters select, #filters input {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    min-width: 160px;
    transition: all 0.3s;
}
#filters select:focus, #filters input:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 8px rgba(52,152,219,0.5);
}

/* ================= Buttons ================= */
.button-container {
    text-align: center;
    margin-bottom: 25px;
}
.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s;
    margin-right: 12px;
}
#exportExcel { background-color: #27ae60; color: #fff; }
#exportExcel:hover { background-color: #2ecc71; transform: scale(1.05); }
#exportPDF { background-color: #c0392b; color: #fff; }
#exportPDF:hover { background-color: #e74c3c; transform: scale(1.05); }

/* ================= Table ================= */
table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 25px rgba(0,0,0,0.1);
}
th, td {
    padding: 14px 16px;
    text-align: left;
    font-size: 0.95rem;
}
th {
    background: linear-gradient(to right, #2575fc, #6a11cb);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
}
tbody tr {
    border-bottom: 1px solid #eee;
    transition: all 0.2s;
}
tbody tr:hover {
    background: #f1f1f1;
    transform: scale(1.01);
}

/* ================= Scroll ================= */
table tbody {
    display: block;
    max-height: 450px;
    overflow-y: auto;
}
table thead, table tbody tr {
    display: table;
    width: 100%;
    table-layout: fixed;
}

/* ================= Responsive ================= */
@media(max-width: 1024px){
    #dashboard { flex-direction: column; align-items: center; }
}
@media(max-width: 768px){
    #filters { flex-direction: column; align-items: center; }
    #filters select, #filters input { width: 100%; max-width: 300px; }
}
</style>
</head>
<body>

<header>
    <h1>Teacher MCQ Dashboard</h1>
    <p>View, filter, and download your MCQ questions in Excel or PDF</p>
</header>

<!-- Dashboard Cards -->
<div id="dashboard">
    <div class="card">
        <h2 id="totalQuestions">0</h2>
        <p>Total Questions</p>
    </div>
    <div class="card">
        <h2 id="totalMcqTypes">0</h2>
        <p>Total MCQ Types</p>
    </div>
    <div class="card">
        <h2 id="mostQuestions">N/A</h2>
        <p>MCQ Type with Most Questions</p>
    </div>
    <div class="card">
        <h2 id="leastQuestions">N/A</h2>
        <p>MCQ Type with Least Questions</p>
    </div>
</div>

<!-- Filters -->
<div id="filters">
    <label>MCQ Type:
        <select id="filterMcqType">
            <option value="">All</option>
        </select>
    </label>
    <label>Question: <input type="text" id="filterQuestion" placeholder="Search by Question"></label>
    <label>Option A: <input type="text" id="filterOptionA" placeholder="Search by Option A"></label>
    <label>Option B: <input type="text" id="filterOptionB" placeholder="Search by Option B"></label>
    <label>Option C: <input type="text" id="filterOptionC" placeholder="Search by Option C"></label>
    <label>Option D: <input type="text" id="filterOptionD" placeholder="Search by Option D"></label>
    <label>Answer: <input type="text" id="filterAnswer" placeholder="Search by Answer"></label>
</div>

<!-- Buttons -->
<div class="button-container">
    <button class="btn" id="exportExcel">Download Excel</button>
    <button class="btn" id="exportPDF">Download PDF</button>
</div>

<!-- Table -->
<table id="mcqQuestionsTable">
    <thead>
        <tr>
            <th>MCQ Type</th>
            <th>Question</th>
            <th>Option A</th>
            <th>Option B</th>
            <th>Option C</th>
            <th>Option D</th>
            <th>Answer</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const baseURL = 'http://localhost:5000';
const loginData = JSON.parse(localStorage.getItem('teacherLogin'));
if(!loginData || loginData.expiry < Date.now() || loginData.data.role !== 'teacher'){
    window.location.href = '../index.html';
}

const teacherId = loginData.data._id;
let allQuestions = [];
let mcqTypesMap = {};

// Fetch MCQ Types
async function fetchMcqTypes() {
    try {
        const res = await fetch(`${baseURL}/api/teachers/mcqtype/teacher/${teacherId}`);
        const data = await res.json();
        if(res.ok && data.data){
            const select = document.getElementById('filterMcqType');
            data.data.forEach(type => {
                mcqTypesMap[type._id] = type.name;
                const option = document.createElement('option');
                option.value = type.name;
                option.innerText = type.name;
                select.appendChild(option);
            });
        }
    } catch (err) { console.error('Error fetching MCQ Types:', err); }
}

// Fetch all MCQ Questions
async function fetchAllMcqQuestions() {
    try {
        await fetchMcqTypes();
        const res = await fetch(`${baseURL}/api/teachers/mcqquestions/teacher/${teacherId}`);
        const result = await res.json();
        if(!res.ok) return alert(result.message || 'Error fetching questions');
        allQuestions = result.data.map(q => ({
            mcqType: mcqTypesMap[q.mcqTypeId] || 'N/A',
            question: q.question,
            optionA: q.options.A,
            optionB: q.options.B,
            optionC: q.options.C,
            optionD: q.options.D,
            answer: q.answer
        }));
        updateDashboard(allQuestions);
        renderTable(allQuestions);
    } catch (err) { console.error(err); alert('Error fetching MCQ Questions: ' + err.message); }
}

// Render table
function renderTable(data){
    const tbody = document.querySelector('#mcqQuestionsTable tbody');
    tbody.innerHTML = '';
    if(data.length === 0){
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No MCQ Questions found</td></tr>';
        return;
    }
    data.forEach(q => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${q.mcqType}</td>
            <td>${q.question}</td>
            <td>${q.optionA}</td>
            <td>${q.optionB}</td>
            <td>${q.optionC}</td>
            <td>${q.optionD}</td>
            <td>${q.answer}</td>
        `;
        tbody.appendChild(row);
    });
}

// Apply filters
function applyFilters(){
    const mcqType = document.getElementById('filterMcqType').value.toLowerCase();
    const filters = {
        question: document.getElementById('filterQuestion').value.toLowerCase(),
        optionA: document.getElementById('filterOptionA').value.toLowerCase(),
        optionB: document.getElementById('filterOptionB').value.toLowerCase(),
        optionC: document.getElementById('filterOptionC').value.toLowerCase(),
        optionD: document.getElementById('filterOptionD').value.toLowerCase(),
        answer: document.getElementById('filterAnswer').value.toLowerCase(),
    };

    const filtered = allQuestions.filter(q =>
        (mcqType === "" || q.mcqType.toLowerCase() === mcqType) &&
        q.question.toLowerCase().includes(filters.question) &&
        q.optionA.toLowerCase().includes(filters.optionA) &&
        q.optionB.toLowerCase().includes(filters.optionB) &&
        q.optionC.toLowerCase().includes(filters.optionC) &&
        q.optionD.toLowerCase().includes(filters.optionD) &&
        q.answer.toLowerCase().includes(filters.answer)
    );
    renderTable(filtered);
}

// Update dashboard summary
function updateDashboard(data){
    document.getElementById('totalQuestions').innerText = data.length;
    const mcqTypeCount = {};
    data.forEach(q => { mcqTypeCount[q.mcqType] = (mcqTypeCount[q.mcqType] || 0) + 1; });
    const mcqTypes = Object.keys(mcqTypeCount);
    document.getElementById('totalMcqTypes').innerText = mcqTypes.length;
    const most = Object.entries(mcqTypeCount).reduce((a,b) => b[1] > a[1] ? b : a, ["N/A",0]);
    const least = Object.entries(mcqTypeCount).reduce((a,b) => b[1] < a[1] ? b : a, ["N/A",0]);
    document.getElementById('mostQuestions').innerText = `${most[0]} (${most[1]})`;
    document.getElementById('leastQuestions').innerText = `${least[0]} (${least[1]})`;
}

// Export Excel
document.getElementById('exportExcel').addEventListener('click', () => {
    if(!allQuestions.length) return alert('No data to export!');
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(allQuestions);
    XLSX.utils.book_append_sheet(wb, ws, 'MCQ_Questions');
    XLSX.writeFile(wb, 'MCQ_Questions.xlsx');
});

// Export PDF
document.getElementById('exportPDF').addEventListener('click', () => {
    if(!allQuestions.length) return alert('No data to export!');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const columns = ["MCQ Type","Question","Option A","Option B","Option C","Option D","Answer"];
    const rows = allQuestions.map(q => [q.mcqType,q.question,q.optionA,q.optionB,q.optionC,q.optionD,q.answer]);
    doc.autoTable({ head:[columns], body: rows, startY: 20 });
    doc.save('MCQ_Questions.pdf');
});

// Event listeners
document.getElementById('filterMcqType').addEventListener('change', applyFilters);
document.getElementById('filterQuestion').addEventListener('input', applyFilters);
document.getElementById('filterOptionA').addEventListener('input', applyFilters);
document.getElementById('filterOptionB').addEventListener('input', applyFilters);
document.getElementById('filterOptionC').addEventListener('input', applyFilters);
document.getElementById('filterOptionD').addEventListener('input', applyFilters);
document.getElementById('filterAnswer').addEventListener('input', applyFilters);

// Load questions on page load
fetchAllMcqQuestions();
</script>

</body>
</html>
