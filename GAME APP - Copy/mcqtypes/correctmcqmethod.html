<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCQ Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    header { background: #007bff; color: white; padding: 20px; text-align: center;}
    .container { padding: 20px; }
    .user-info, .mcq-container { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    .mcq-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    .mcq-card h3 { margin: 0 0 10px; color: #007bff; }
    button { background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .time-warning { color: red; font-weight: bold; }
  </style>
</head>
<body>

<header><h1>MCQ Dashboard</h1></header>
<div class="container">
  <div class="user-info">
    <h2>User Info</h2>
    <p>ID: <span id="userId">...</span></p>
    <p>Name: <span id="username">...</span></p>
    <p>Email: <span id="userEmail">...</span></p>
    <p>Initial: <span id="userInitial">...</span></p>
  </div>

  <div class="mcq-container" id="mcqContainer">
    <h2>Available MCQ Types</h2>
    <!-- MCQ entries injected here -->
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:5000';

  function getLoggedInUserInfo() {
    const s = localStorage.getItem('user');
    let id = 'N/A', name = 'Guest', email = '', initial = 'G';
    if (s) {
      try {
        const u = JSON.parse(s);
        id = u._id || u.id || 'N/A';
        name = u.username || u.fullName || u.name || 'Unknown';
        email = u.email || '';
        initial = name.charAt(0).toUpperCase() || 'U';
      } catch {
        id = 'Error'; name = 'Error'; initial = 'E';
      }
    }
    return { id, name, email, initial };
  }

  async function fetchMcqs() {
    const resp = await fetch(`${API_BASE}/api/mcqtypes`);
    return resp.ok ? resp.json() : [];
  }

  function nowInIST() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const offset = 5.5 * 60 * 60000; // IST = UTC+5:30
    return new Date(utc + offset);
  }

async function purchaseAndStart(mcqType) {
  try {
    const user = getLoggedInUserInfo();
    if (!user || !user.id) {
      return alert('Please login to start the quiz');
    }

    const now = nowInIST();
    const startTime = new Date(mcqType.startTimeBeforeStart);
    const dueTime = new Date(mcqType.dueTimeBeforeStart);

    // ✅ FIRST VALIDATION: Check time BEFORE even attempting payment
    if (now < startTime) {
      return alert('Quiz has not started yet. Please wait until the start time.');
    }

    if (now >= dueTime) {
      return alert('Quiz time is over. You cannot participate now.');
    }

    // ✅ Prepare payload for payment
    const paymentId = 'PAY-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    const orderId = 'ORD-' + Date.now();

    const payload = {
      userId: user.id,
      mcqTypeId: mcqType._id,
      mcqTypeName: mcqType.name,
      amount: mcqType.entryFee,
      paymentId: paymentId,
      orderId: orderId
    };

    const resp = await fetch(`${API_BASE}/api/purchase`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await resp.json();

    // ✅ Handle "already paid" case
    if (!resp.ok && data.message && data.message.includes('already paid')) {
      return window.location = `allmcqshowinone.html?userId=${encodeURIComponent(user.id)}&mcqTypeId=${encodeURIComponent(mcqType._id)}`;
    }

    // ✅ Handle other errors
    if (!resp.ok) {
      return alert(data.error || data.message || 'Puse fadjvsdiled');
    }

    // ✅ Payment success → proceed to quiz
    window.location = `allmcqshowinone.html?userId=${encodeURIComponent(user.id)}&mcqTypeId=${encodeURIComponent(mcqType._id)}`;
    
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to start quiz. Please try again.');
  }
}


  function formatTimeDifference(due) {
    const now = nowInIST();
    const diffMs = due - now;
    if (diffMs <= 0) return 'Closed';

    const minutes = Math.floor(diffMs / 60000);
    const seconds = Math.floor((diffMs % 60000) / 1000);
    return `${minutes}m ${seconds}s left to join`;
  }

  async function initPage() {
    const user = getLoggedInUserInfo();
    document.getElementById('userId').textContent = user.id;
    document.getElementById('username').textContent = user.name;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userInitial').textContent = user.initial;

    const mcqs = await fetchMcqs();
    const cont = document.getElementById('mcqContainer');
    cont.innerHTML = '';

    mcqs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'mcq-card';

      const startTime = new Date(m.startTimeBeforeStart);
      const dueTime = new Date(m.dueTimeBeforeStart);
      const remainingTime = formatTimeDifference(dueTime);

      div.innerHTML = `
        <h3>${m.name}</h3>
        <p><strong>Description:</strong> ${m.description || 'N/A'}</p>
        <p><strong>Entry Fee:</strong> ₹${m.entryFee}</p>
        <p><strong>Start Time:</strong> ${startTime.toLocaleString()}</p>
        <p><strong>Due Time:</strong> ${dueTime.toLocaleString()}</p>
        <p><strong>Created:</strong> ${new Date(m.createdAt).toLocaleString()}</p>
        <p class="time-warning">${remainingTime}</p>
        <button ${remainingTime === 'Closed' ? 'disabled' : ''}>
          ${m.entryFee > 0 ? 'Start (₹' + m.entryFee + ')' : 'Start (Free)'}
        </button>
      `;

      div.querySelector('button').onclick = () => purchaseAndStart(m);
      cont.appendChild(div);
    });
  }

  document.addEventListener('DOMContentLoaded', initPage);
</script>

</body>
</html>
