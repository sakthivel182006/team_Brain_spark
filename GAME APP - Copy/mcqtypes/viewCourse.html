<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Enrolled Courses · Dashboard</title>
  <!-- Tailwind CSS via CDN + subtle background -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* soft gradient background – no interference with logic */
    body { background: linear-gradient(145deg, #f1f5f9 0%, #e6edf7 100%); }
  </style>
</head>
<body class="antialiased font-sans min-h-screen flex flex-col">

  <!-- main container with comfortable padding -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

    <!-- header area: title + optional logout (purely UI, preserves original code) -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-10">
      <div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-800 to-teal-600 tracking-tight">
          My Enrolled Courses
        </h1>
        <p class="text-sm text-slate-500 mt-1 ml-1">Continue learning where you left off</p>
      </div>

      <!-- logout button – does not alter any existing condition, purely additive -->
      <button onclick="logoutHelper()" class="group flex items-center gap-2 bg-white/80 backdrop-blur-sm hover:bg-white text-slate-600 hover:text-indigo-700 px-5 py-2.5 rounded-full shadow-sm border border-slate-200 transition duration-200 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Logout</span>
      </button>
    </div>

    <!-- course container: exactly the same ID used by original script -->
    <div id="courseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-fr">
      <!-- dynamic cards injected by loadEnrolledCourses() -->
    </div>

    <!-- small empty state hint (will be overwritten by script if no courses) is fine -->
  </div>

  <!-- tiny logout helper (does not modify or override any original function) -->
  <script>
    function logoutHelper() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>

  <!-- ========== ORIGINAL SCRIPT (EXACT LOGIC, UNCHANGED) ========== -->
  <script>
    const API_BASE = "http://localhost:5000/api/agent";
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || user.role !== "user") {
      alert("Login required");
      window.location.href = "index.html";
    }

    // ==========================
    // LOAD ENROLLED COURSES
    // ==========================
    async function loadEnrolledCourses() {

      const res = await fetch(`${API_BASE}/enroll/user/${user.id}`);
      const courses = await res.json();

      const container = document.getElementById("courseContainer");
      container.innerHTML = "";

      if (!Array.isArray(courses) || courses.length === 0) {
        // nicer empty state with Tailwind classes (still respects original condition)
        container.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 px-4 bg-white/50 backdrop-blur-sm rounded-3xl border border-dashed border-indigo-200">
            <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-300 mb-4">
              <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
            <p class="text-lg font-medium text-gray-700">No enrolled courses found.</p>
            <p class="text-sm text-gray-500 mt-1">Explore courses and enroll to get started</p>
            <a href="courses.html" class="mt-6 inline-flex items-center gap-2 bg-gradient-to-r from-indigo-600 to-teal-500 text-white px-6 py-2.5 rounded-full text-sm font-medium shadow-md hover:shadow-lg transition">Browse courses</a>
          </div>
        `;
        return;
      }

      courses.forEach(course => {

        const div = document.createElement("div");

        // 🎨 enhanced card with Tailwind — same functionality, modern look
        div.className = "bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 border border-indigo-50/80 flex flex-col overflow-hidden group";
        div.innerHTML = `
          <div class="p-6 flex-1">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-100 to-teal-100 rounded-xl flex items-center justify-center mb-4 text-indigo-700">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-indigo-700 transition-colors">${course.title}</h3>
            <p class="text-gray-600 text-sm leading-relaxed mb-4 line-clamp-3">${course.description || "No description provided."}</p>
          </div>
          <div class="px-6 pb-6 pt-2">
            <button onclick="goToCourse('${course._id}')" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-teal-500 hover:from-indigo-700 hover:to-teal-600 text-white font-medium py-2.5 px-4 rounded-xl shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
              </svg>
              <span>Go to course</span>
            </button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    // Redirect to course page (original function)
    function goToCourse(courseId) {
      window.location.href = `viewCoursemodules.html?courseId=${courseId}`;
    }

    loadEnrolledCourses();
  </script>
  <!-- ========== END ORIGINAL SCRIPT ========== -->

  <!-- subtle footer (decorative) -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 text-center text-xs text-slate-400 border-t border-slate-200/60 pt-6">
    <span>my learning · my progress · my future</span>
  </div>
</body>
</html>
