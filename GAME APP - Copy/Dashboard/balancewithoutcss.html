<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Wallet Balance</title>
  <style>
  </style>
</head>
<body>

<div class="user-card">
  <div id="userInitial" class="user-initial">G</div>
  <div id="username" class="user-info">Guest</div>
  <div id="userId" class="user-info">ID: N/A</div>
  <div id="userEmail" class="user-info">Email: </div>
  <div id="userBalance" class="balance">Balance: ₹0</div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Get user data from localStorage
    const user = JSON.parse(localStorage.getItem('user'));
    const isLoggedIn = localStorage.getItem('isLoggedIn');

    // Check if user is not logged in
    if (!user || isLoggedIn !== 'true') {
      // Redirect to Home.html in the same folder
      window.location.href = '../Home.html';
      return;
    }
  });
</script>

<script>
  async function fetchUserBalance(userId) {
    try {
      const response = await fetch(`http://localhost:5000/api/balance/${userId}`); // ✅ BACKEND PATH
      if (!response.ok) throw new Error('Failed to fetch balance');
      
      const data = await response.json();
      document.getElementById('userBalance').textContent = `Balance: ₹${data.balance}`;
    } catch (error) {
      console.error('Error fetching balance:', error);
      document.getElementById('userBalance').textContent = 'Balance: Error';
    }
  }

  function getLoggedInUserInfo() {
    const userString = localStorage.getItem('user');
    let userId = 'N/A';
    let userName = 'Guest';
    let userEmail = '';
    let userInitial = 'G';

    if (userString) {
      try {
        const userData = JSON.parse(userString);
        userId = userData._id || userData.id || userData.userId || userData.userID || 'N/A';
        userName = userData.username || userData.fullName || userData.name || 'Unknown User';
        userEmail = userData.email || '';
        userInitial = userName ? userName.charAt(0).toUpperCase() : 'U';
      } catch (e) {
        console.error('Error parsing user data from localStorage:', e);
        userName = 'Error User';
        userId = 'Error';
        userInitial = 'E';
      }
    } else {
      console.warn("User data not found in localStorage.");
    }

    return { id: userId, name: userName, email: userEmail, initial: userInitial };
  }

  document.addEventListener('DOMContentLoaded', () => {
    const userInfo = getLoggedInUserInfo();

    document.getElementById('username').textContent = userInfo.name;
    document.getElementById('userId').textContent = `ID: ${userInfo.id}`;
    document.getElementById('userEmail').textContent = `Email: ${userInfo.email}`;
    document.getElementById('userInitial').textContent = userInfo.initial;

    if (userInfo.id && userInfo.id !== 'N/A' && userInfo.id !== 'Error') {
      fetchUserBalance(userInfo.id); // ✅ Call backend to get balance
    }
  });
</script>

</body>
</html>
