<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Plans Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    form, table {
      margin: 20px auto;
      width: 90%;
      max-width: 900px;
    }
    input[type="text"],
    input[type="number"] {
      padding: 6px;
      margin: 0 10px 10px 0;
      width: 150px;
    }
    button {
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #3498db;
      color: #fff;
    }
    tr:nth-child(even) {
      background: #f9f9f9;
    }
  </style>
</head>
<body>

  <h1>Payment Plans Management</h1>

  <!-- Create / Update Form -->
  <form id="planForm">
    <input type="hidden" id="planId">
    <input type="text" id="planName" placeholder="Plan Name" required>
    <input type="number" id="noOfTeachers" placeholder="No. of Teachers" required>
    <input type="number" id="amount" placeholder="Amount" required>
    <input type="number" id="offer" placeholder="Offer (%)" min="0" max="100">
    <button type="submit">Save Plan</button>
    <button type="button" id="resetForm">Reset</button>
  </form>

  <!-- Plans Table -->
  <table id="plansTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Plan Name</th>
        <th>No. of Teachers</th>
        <th>Amount</th>
        <th>Offer (%)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API_URL = 'https://gameappbackend-i8zv.onrender.com/api/paymentplans';

    // ✅ Check if user is logged in and is admin
    const user = JSON.parse(localStorage.getItem('user'));
    const isLoggedIn = localStorage.getItem('isLoggedIn');

    if (!user || user.role !== 'admin' || !isLoggedIn) {
      alert("Session expired. Please log in again.");
      window.location.href = '../index.html';
    }

    // Elements
    const planForm = document.getElementById('planForm');
    const planIdInput = document.getElementById('planId');
    const planNameInput = document.getElementById('planName');
    const noOfTeachersInput = document.getElementById('noOfTeachers');
    const amountInput = document.getElementById('amount');
    const offerInput = document.getElementById('offer');
    const plansTableBody = document.querySelector('#plansTable tbody');
    const resetBtn = document.getElementById('resetForm');

    // ✅ Fetch and display all plans
    async function fetchPlans() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to fetch plans');

        plansTableBody.innerHTML = '';
        data.plans.forEach(plan => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${plan._id}</td>
            <td>${plan.planname}</td>
            <td>${plan.noOfTeachers}</td>
            <td>${plan.amount}</td>
            <td>${plan.offer}</td>
            <td>
              <button onclick="editPlan('${plan._id}', '${plan.planname}', ${plan.noOfTeachers}, ${plan.amount}, ${plan.offer})">Edit</button>
              <button onclick="deletePlan('${plan._id}')">Delete</button>
            </td>
          `;
          plansTableBody.appendChild(row);
        });
      } catch (err) {
        console.error(err);
        alert('❌ Error loading payment plans: ' + err.message);
      }
    }

    // ✅ Create or Update plan
    planForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const planData = {
        planname: planNameInput.value.trim(),
        noOfTeachers: Number(noOfTeachersInput.value),
        amount: Number(amountInput.value),
        offer: Number(offerInput.value || 0)
      };

      try {
        let res;
        if (planIdInput.value) {
          // Update
          res = await fetch(`${API_URL}/update/${planIdInput.value}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(planData)
          });
        } else {
          // Create
          res = await fetch(`${API_URL}/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(planData)
          });
        }

        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Operation failed');

        alert(planIdInput.value ? '✅ Plan updated successfully!' : '✅ Plan created successfully!');
        resetFormFields();
        fetchPlans();
      } catch (err) {
        console.error(err);
        alert('❌ Error saving plan: ' + err.message);
      }
    });

    // ✅ Edit plan
    function editPlan(id, planname, noOfTeachers, amount, offer) {
      planIdInput.value = id;
      planNameInput.value = planname;
      noOfTeachersInput.value = noOfTeachers;
      amountInput.value = amount;
      offerInput.value = offer;
    }

    // ✅ Delete plan
    async function deletePlan(id) {
      if (!confirm('Are you sure you want to delete this plan?')) return;
      try {
        const res = await fetch(`${API_URL}/delete/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Delete failed');
        alert('✅ Plan deleted successfully!');
        fetchPlans();
      } catch (err) {
        console.error(err);
        alert('❌ Error deleting plan: ' + err.message);
      }
    }

    // ✅ Reset form
    function resetFormFields() {
      planIdInput.value = '';
      planNameInput.value = '';
      noOfTeachersInput.value = '';
      amountInput.value = '';
      offerInput.value = '';
    }

    resetBtn.addEventListener('click', resetFormFields);

    // Initial load
    fetchPlans();
  </script>

</body>
</html>
