<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Earnings & Ranks</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .table-container {
      max-height: 500px;
      overflow-y: auto;
    }
    .table-container::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .table-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .table-container::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }
    .table-container::-webkit-scrollbar-thumb:hover {
      background: #a1a1a1;
    }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">User Earnings Distribution</h1>
        <p class="text-gray-600 mt-1">Detailed breakdown by MCQ Type</p>
      </div>
      <div class="flex gap-3">
        <button id="exportAllBtn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg shadow transition transform hover:scale-105">
          <i class="fas fa-file-excel"></i> Export All Data
        </button>
      </div>
    </div>
    
    <div id="tableContainer" class="space-y-6"></div>
  </div>
<script>
    // Redirect to index.html if admin is not logged in
    window.onload = function () {
     // Get user data from localStorage
            const user = JSON.parse(localStorage.getItem('user'));
            const isLoggedIn = localStorage.getItem('isLoggedIn');

             // 🔒 Check login and role
            if (!user || user.role !== 'admin') {
                alert("session expired");
                window.location.href = '../index.html';
                return;
            }
          }
  </script> 
  <script>
    async function fetchData() {
      try {
        const loadingIndicator = `
          <div class="flex flex-col items-center justify-center py-12 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
            <p class="text-gray-600">Loading earnings data...</p>
          </div>
        `;
        document.getElementById('tableContainer').innerHTML = loadingIndicator;

        const response = await fetch("https://gameappbackend-i8zv.onrender.com/api/getAllUserAmounts");
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        
        if (data.success) {
          renderTable(data.data);
        } else {
          showError(data.message || "Failed to fetch data from server");
        }
      } catch (error) {
        console.error("Error fetching data:", error);
        showError("Failed to connect to the server. Please try again later.");
      }
    }

    function showError(message) {
      document.getElementById('tableContainer').innerHTML = `
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow fade-in">
          <div class="flex items-start">
            <div class="flex-shrink-0 pt-0.5">
              <i class="fas fa-exclamation-circle h-5 w-5 text-red-500"></i>
            </div>
            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">Error loading data</h3>
              <div class="mt-2 text-sm text-red-700">
                <p>${message}</p>
              </div>
              <div class="mt-4">
                <button onclick="fetchData()" class="text-sm font-medium text-red-700 hover:text-red-600">
                  <span aria-hidden="true">&rarr;</span> Retry
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTable(data) {
      if (!data || data.length === 0) {
        document.getElementById('tableContainer').innerHTML = `
          <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-lg shadow fade-in">
            <div class="flex">
              <div class="flex-shrink-0">
                <i class="fas fa-info-circle h-5 w-5 text-yellow-500"></i>
              </div>
              <div class="ml-3">
                <p class="text-sm text-yellow-700">No earnings data available.</p>
              </div>
            </div>
          </div>
        `;
        return;
      }

      const grouped = {};
      let tableHTML = "";

      // Group by MCQ Type ID
      data.forEach(item => {
        const key = item.mcqTypeId;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(item);
      });

      for (const mcqId in grouped) {
        const rows = grouped[mcqId];
        const mcqName = rows[0].mcqName || "Unknown";
        const sanitizedMcqName = mcqName.replace(/[\\/:*?"<>|[\]]/g, ""); // Sanitize for filename

        // Calculate totals for this MCQ type
        const totals = {
          entryFee: 0,
          userAmount: 0,
          adminAmount: 0,
          deduction: 0
        };

        rows.forEach(item => {
          totals.entryFee += item.entryFee || 0;
          totals.userAmount += item.userAmount || 0;
          totals.adminAmount += item.adminAmount || 0;
          totals.deduction += item.negativeMarkDeduction || 0;
        });

        tableHTML += `
          <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-4 border-b bg-gradient-to-r from-indigo-50 to-blue-50">
              <div>
                <h3 class="text-lg font-semibold text-gray-800">${mcqName}</h3>
                <div class="flex flex-wrap gap-x-4 gap-y-1 mt-1 text-sm text-gray-600">
                  <span><span class="font-medium">Total Participants:</span> ${rows.length}</span>
                  <span><span class="font-medium">Total Prize:</span> ₹${totals.userAmount.toFixed(2)}</span>
                  <span><span class="font-medium">Total Admin:</span> ₹${totals.adminAmount.toFixed(2)}</span>
                </div>
              </div>
              <button 
                data-mcq-id="${mcqId}" 
                data-mcq-name="${sanitizedMcqName}"
                class="export-single-btn mt-2 md:mt-0 flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-2 px-3 rounded-lg shadow transition transform hover:scale-105"
              >
                <i class="fas fa-file-export"></i> Export This
              </button>
            </div>
            <div class="table-container">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rank</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entry Fee (₹)</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User %</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Admin %</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User Amount (₹)</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Admin Amount (₹)</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Deduction (₹)</th>
                  </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
        `;

        rows.sort((a, b) => a.rank - b.rank).forEach(item => {
          tableHTML += `
            <tr class="hover:bg-gray-50 transition">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${item.rank <= 3 ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800'}">
                  ${item.rank}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${item.userId?.email || 'N/A'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${item.entryFee?.toFixed(2) || '0.00'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${item.userPercentage || '0'}%</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${item.adminPercentage || '0'}%</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-green-600">${item.userAmount?.toFixed(2) || '0.00'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${item.adminAmount?.toFixed(2) || '0.00'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-red-600">${item.negativeMarkDeduction?.toFixed(2) || '0.00'}</td>
            </tr>
          `;
        });

        tableHTML += `
                </tbody>
                <tfoot class="bg-gray-50 font-medium">
                  <tr>
                    <td class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Total</td>
                    <td class="px-6 py-3 text-left text-xs text-gray-500"></td>
                    <td class="px-6 py-3 text-left text-xs text-gray-600">₹${totals.entryFee.toFixed(2)}</td>
                    <td class="px-6 py-3 text-left text-xs text-gray-500"></td>
                    <td class="px-6 py-3 text-left text-xs text-gray-500"></td>
                    <td class="px-6 py-3 text-left text-xs text-green-600">₹${totals.userAmount.toFixed(2)}</td>
                    <td class="px-6 py-3 text-left text-xs text-gray-600">₹${totals.adminAmount.toFixed(2)}</td>
                    <td class="px-6 py-3 text-left text-xs text-red-600">₹${totals.deduction.toFixed(2)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        `;
      }

      document.getElementById("tableContainer").innerHTML = tableHTML;
      setupExportButtons();
    }

    function setupExportButtons() {
      // Export all tables
      document.getElementById("exportAllBtn").addEventListener("click", () => {
        const tables = document.querySelectorAll("table");
        if (tables.length === 0) {
          alert("No data available to export");
          return;
        }

        const wb = XLSX.utils.book_new();
        
        tables.forEach((table, index) => {
          try {
            const ws = XLSX.utils.table_to_sheet(table);
            const mcqName = table.closest('div').querySelector('h3').textContent;
            const sheetName = mcqName.substring(0, 25).replace(/[\\/:*?"<>|[\]]/g, "") || `Sheet${index + 1}`;
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
          } catch (error) {
            console.error("Error exporting table:", error);
          }
        });

        try {
          XLSX.writeFile(wb, "mcq_earnings_report.xlsx");
        } catch (error) {
          console.error("Error generating Excel file:", error);
          alert("Failed to generate Excel file. Please try again.");
        }
      });

      // Export single tables
      document.querySelectorAll(".export-single-btn").forEach(btn => {
        btn.addEventListener("click", function() {
          const table = this.closest('.bg-white').querySelector('table');
          try {
            const ws = XLSX.utils.table_to_sheet(table);
            const wb = XLSX.utils.book_new();
            const mcqName = this.getAttribute('data-mcq-name').substring(0, 31) || "mcq_earnings";
            
            XLSX.utils.book_append_sheet(wb, ws, mcqName);
            XLSX.writeFile(wb, `${mcqName}_earnings.xlsx`);
          } catch (error) {
            console.error("Error exporting table:", error);
            alert("Failed to export this table. Please try again.");
          }
        });
      });
    }

    // Initialize the page
    document.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
