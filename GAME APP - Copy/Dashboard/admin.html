<!DOCTYPE html>
<html>
<head>
    <title>Earnings Approval</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #999;
            text-align: left;
        }
        th {
            background-color: #eee;
        }
    </style>
</head>
<body>
    <h1>Earnings Distribution Details</h1>
    <div id="earnings-container">Loading...</div>

    <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Get user data from localStorage
    const user = JSON.parse(localStorage.getItem('user'));
    const isLoggedIn = localStorage.getItem('isLoggedIn');

    // Check if user is not logged in
    if (!user || isLoggedIn !== 'true') {
      // Redirect to Home.html in the same folder
      window.location.href = '../Home.html';
      return;
    }
  });

</script>

    <script>
        async function fetchEarnings() {
            try {
                const response = await fetch('http://localhost:5000/api/testsubmissions/calculate-earnings');
                const data = await response.json();

                if (!Array.isArray(data)) {
                    document.getElementById('earnings-container').innerText = 'No data found.';
                    return;
                }

                // Group by mcqTypeId
                const grouped = {};
                data.forEach(entry => {
                    const mcqType = entry.mcqTypeId;
                    if (!grouped[mcqType]) {
                        grouped[mcqType] = {
                            mcqName: entry.mcqName,
                            entries: []
                        };
                    }
                    grouped[mcqType].entries.push(entry);
                });

                // Generate HTML
                const container = document.getElementById('earnings-container');
                container.innerHTML = '';

                Object.keys(grouped).forEach(mcqTypeId => {
                    const group = grouped[mcqTypeId];
                    const table = document.createElement('table');

                    const heading = document.createElement('h2');
                    heading.textContent = `MCQ Type: ${group.mcqName}`;
                    container.appendChild(heading);

                    const headerRow = `
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Percentage</th>
                            <th>Correct</th>
                            <th>Wrong</th>
                            <th>Entry Fee</th>
                            <th>User Earning</th>
                            <th>Admin Earning</th>
                            <th>Negative Mark Deduction</th>
                            <th>Submitted At</th>
                        </tr>
                    `;

                    const rows = group.entries.map(entry => `
                        <tr>
                            <td>${entry.username}</td>
                            <td>${entry.email}</td>
                            <td>${entry.percentage}%</td>
                            <td>${entry.correctAnswers}</td>
                            <td>${entry.wrongAnswers}</td>
                            <td>₹${entry.mcqAmount}</td>
                            <td>₹${entry.userEarning}</td>
                            <td>₹${entry.adminEarning}</td>
                            <td>₹${entry.negativeMarkDeduction}</td>
                            <td>${new Date(entry.submittedAt).toLocaleString()}</td>
                        </tr>
                    `).join('');

                    table.innerHTML = headerRow + rows;
                    container.appendChild(table);
                });

            } catch (error) {
                console.error('Error fetching earnings:', error);
                document.getElementById('earnings-container').innerText = 'Failed to load earnings.';
            }
        }

        fetchEarnings();
    </script>
</body>
</html>
