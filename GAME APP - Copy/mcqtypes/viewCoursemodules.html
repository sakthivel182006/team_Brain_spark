<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Modules · learn & practice</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- custom hover effect -->
  <style>
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen flex flex-col">

  <!-- main container -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

    <!-- ========== TOP ROW: heading left, buttons right ========== -->
    <div class="flex flex-wrap items-center justify-between gap-6 mb-8">
      <!-- left side: page heading & subtitle -->
      <div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-teal-600 mb-1">📚 Course Modules</h1>
        <p class="text-slate-500 text-sm">Watch videos, learn concepts, and share your feedback.</p>
      </div>

      <!-- right side: grouped buttons -->
      <div class="flex flex-wrap items-center gap-3">
        <!-- Online compiler button -->
        <a href="https://sakthijavacompiler.vercel.app/" target="_blank" rel="noopener noreferrer"
           class="card-hover flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-br from-blue-400 to-blue-600 text-white shadow-lg">
          <!-- code bracket icon (compiler) -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
          </svg>
          <span class="text-sm font-semibold">online compiler</span>
        </a>

        <!-- AI doubt clearer button (with brain icon for AI) -->
        <a href="../llm/Openai.html" 
           class="card-hover flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-br from-blue-400 to-blue-600 text-white shadow-lg">
          <!-- brain icon (AI / doubt clearing) -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
          <span class="text-sm font-semibold">AI doubt clearer</span>
        </a>

        <!-- Logout button -->
        <button onclick="logoutHelper()" 
                class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white hover:bg-slate-100 text-slate-600 hover:text-indigo-700 shadow-sm border border-slate-200 transition text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>

    <!-- modules container: now grid with 2 columns on medium screens and up -->
    <div id="moduleContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- dynamic content injected by loadModules() -->
    </div>
  </div>

  <!-- small logout helper (doesn't interfere with original functions) -->
  <script>
    function logoutHelper() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>

  <!-- ========== ORIGINAL SCRIPT (EXACT LOGIC, ENHANCED UI VIA TAILWIND) ========== -->
  <script>
    const API_BASE = "http://localhost:5000/api/agent";
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || user.role !== "user") {
      alert("Login required");
      window.location.href = "index.html";
    }

    // Get courseId from URL
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get("courseId");

    if (!courseId) {
      alert("Course not found");
      window.location.href = "studentCourses.html";
    }

    // ==========================
    // LOAD MODULES
    // ==========================
    async function loadModules() {

      try {

        const res = await fetch(`${API_BASE}/modules/course/${courseId}`);
        const modules = await res.json();

        const container = document.getElementById("moduleContainer");
        container.innerHTML = "";

        if (!Array.isArray(modules) || modules.length === 0) {
          // empty state spans both columns
          container.innerHTML = `
            <div class="col-span-1 md:col-span-2 bg-white rounded-2xl p-12 text-center border border-dashed border-indigo-200 shadow-sm">
              <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
              </div>
              <p class="text-lg font-medium text-gray-700">No modules found for this course.</p>
              <p class="text-sm text-gray-500 mt-1">Check back later or contact instructor.</p>
            </div>
          `;
          return;
        }

        modules.forEach(module => {

          const div = document.createElement("div");
          // modern module card with accent border and soft shadow
          div.className = "bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow border-l-4 border-indigo-400 overflow-hidden h-full flex flex-col";

          // video handling: if videoUrl exists, show video; else placeholder
          const videoHtml = module.videoUrl 
            ? `<video class="w-full rounded-lg border border-slate-200 bg-black" controls>
                 <source src="${module.videoUrl}" type="video/mp4">
                 Your browser does not support the video tag.
               </video>`
            : `<div class="bg-slate-100 rounded-lg p-8 text-center text-slate-400 border border-dashed">🎥 No video available for this module</div>`;

          div.innerHTML = `
            <div class="p-6 md:p-8 flex-1 flex flex-col">
              <!-- header with title and concept tag -->
              <div class="flex flex-wrap items-start justify-between gap-3 mb-5">
                <h3 class="text-2xl font-bold text-gray-800">${module.title}</h3>
                <span class="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full text-sm font-semibold shadow-sm">
                  ${module.conceptTag || 'core concept'}
                </span>
              </div>

              <!-- video section -->
              <div class="mb-8">
                ${videoHtml}
              </div>

              <!-- feedback form (will always be at bottom) -->
              <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 mt-auto">
                <h4 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                  <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
                  </svg>
                  Submit your feedback
                </h4>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-4">
                  <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Rating</label>
                    <select id="rating-${module._id}" 
                            class="w-full p-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                      <option value="5">5 - Excellent</option>
                      <option value="4">4 - Good</option>
                      <option value="3">3 - Average</option>
                      <option value="2">2 - Poor</option>
                      <option value="1">1 - Very Bad</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Comment</label>
                    <textarea id="comment-${module._id}" 
                              rows="2"
                              placeholder="What did you think? Helpful, confusing, suggestions..."
                              class="w-full p-2.5 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400"></textarea>
                  </div>
                </div>

                <button onclick="submitFeedback('${module._id}')" 
                        class="mt-2 bg-gradient-to-r from-indigo-600 to-teal-500 hover:from-indigo-700 hover:to-teal-600 text-white font-medium py-2.5 px-6 rounded-lg shadow-md hover:shadow-lg transition flex items-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                  </svg>
                  Submit feedback
                </button>
              </div>
            </div>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        console.error("Module Load Error:", err);
        alert("Failed to load modules");
      }
    }


    // ==========================
    // SUBMIT FEEDBACK
    // ==========================
    async function submitFeedback(moduleId) {

      const rating = document.getElementById(`rating-${moduleId}`).value;
      const comment = document.getElementById(`comment-${moduleId}`).value;

      if (!comment.trim()) {
        alert("Please enter feedback comment");
        return;
      }

      try {

        const res = await fetch(`${API_BASE}/feedback`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: user.id,
            courseId: courseId,
            moduleId: moduleId,
            rating: rating,
            comment: comment
          })
        });

        const result = await res.json();

        if (res.ok) {
          alert("✅ Feedback submitted successfully!");
          document.getElementById(`comment-${moduleId}`).value = "";
        } else {
          alert(result.message || "Failed to submit feedback");
        }

      } catch (error) {
        console.error("Feedback Error:", error);
        alert("Error submitting feedback");
      }
    }

    loadModules();
  </script>
  <!-- ========== END ORIGINAL SCRIPT ========== -->

  <!-- simple footer -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 pb-4 text-center text-xs text-slate-400 border-t border-slate-200/60 pt-6">
    <span>master each module · one step at a time</span>
  </div>
</body>
</html>
