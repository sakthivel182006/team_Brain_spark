<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Email | Crack Quiz With Sakthi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6b46c1;
      --primary-light: #805ad5;
      --primary-dark: #553c9a;
      --secondary: #f6ad55;
      --accent: #68d391;
      --error: #fc8181;
      --light-bg: #f8fafc;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light-bg);
      background-image: radial-gradient(circle at 10% 20%, rgba(107, 70, 193, 0.05) 0%, rgba(107, 70, 193, 0.05) 90%);
    }
    
    /* Auth Card Styles */
    .auth-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }
    
    .auth-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .auth-header::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .auth-header::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .auth-body {
      padding: 2.5rem;
      position: relative;
    }
    
    .auth-body::before {
      content: '';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 30px;
      height: 30px;
      background: white;
    }
    
    /* Form Elements */
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      background-color: #f8fafc;
      transition: all 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(128, 90, 213, 0.3);
      background-color: white;
    }
    
    .form-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #a0aec0;
    }
    
    .form-check-icon {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    /* Buttons */
    .auth-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(107, 70, 193, 0.3), 0 2px 4px -1px rgba(107, 70, 193, 0.1);
    }
    
    .auth-btn:active {
      transform: translateY(0);
    }
    
    .auth-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .auth-btn:hover::after {
      opacity: 1;
    }
    
    .auth-btn span {
      position: relative;
      z-index: 1;
    }
    
    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    .wave {
      animation: wave 2s infinite;
    }
    
    /* Message Styles */
    .success-message {
      color: var(--accent);
    }
    
    .error-message {
      color: var(--error);
    }
    
    /* Background Decorations */
    .bg-dots {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 1px 1px, rgba(107, 70, 193, 0.1) 1px, transparent 0);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: -1;
    }
    
    /* Confetti */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #f0abfc;
      opacity: 0;
      z-index: 9999;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- Background Decorations -->
  <div class="bg-dots"></div>
  
  <!-- Floating background elements -->
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
    <div class="absolute top-1/4 left-1/4 w-16 h-16 rounded-full bg-purple-100 opacity-20 animate-pulse"></div>
    <div class="absolute top-3/4 right-1/4 w-24 h-24 rounded-full bg-purple-200 opacity-10 animate-pulse" style="animation-delay: 0.5s;"></div>
    <div class="absolute bottom-1/3 right-1/3 w-20 h-20 rounded-full bg-purple-100 opacity-15 animate-pulse" style="animation-delay: 1s;"></div>
  </div>

  <div class="w-full max-w-md animate__animated animate__fadeIn z-10">
    <div class="auth-card">
      <div class="auth-header">
        <div class="relative inline-block mb-6">
          <div class="w-20 h-20 bg-white bg-opacity-20 rounded-xl backdrop-blur-sm flex items-center justify-center floating">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white wave" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
          </div>
          <div class="absolute -top-2 -right-2 w-6 h-6 bg-yellow-300 rounded-full flex items-center justify-center text-xs font-bold text-purple-900 animate__animated animate__bounceIn">!</div>
        </div>
        
        <h1 class="text-3xl font-bold tracking-tight">Verify Your Email</h1>
        <p class="mt-3 opacity-90 max-w-xs mx-auto">We'll send you a magic link to verify your email address</p>
      </div>
      
      <div class="auth-body">
        <div class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2 flex items-center">
              <span>Email Address</span>
              <span class="ml-1 text-xs text-purple-600 font-semibold">*required</span>
            </label>
            <div class="relative transition-all duration-300">
              <i class="far fa-envelope form-icon"></i>
              <input 
                type="email" 
                id="emailInput" 
                placeholder="your@email.com" 
                class="form-input"
                autocomplete="email"
              >
              <i class="fas fa-check-circle form-check-icon"></i>
            </div>
          </div>
          
          <button 
            onclick="sendVerification()" 
            class="w-full auth-btn flex items-center justify-center pulse"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
            <span>Send Verification Link</span>
          </button>
          
          <p id="message" class="text-sm text-center min-h-6 transition-all duration-300"></p>
          
          <div class="text-center pt-4 border-t border-gray-100">
            <p class="text-gray-600 text-sm">Already verified? 
              <a href="https://crackquizwithsakthi.vercel.app" class="text-purple-600 font-medium hover:underline transition hover:text-purple-800">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="mt-8 text-center text-xs text-gray-500 flex items-center justify-center space-x-2">
      <i class="fas fa-lock text-purple-400"></i>
      <p>© ${new Date().getFullYear()} Crack Quiz With Sakthi. All rights reserved.</p>
    </div>
  </div>

  <script>
    // Create confetti elements
    function createConfetti() {
      const colors = ['#a78bfa', '#c4b5fd', '#8b5cf6', '#7c3aed', '#ddd6fe'];
      const container = document.querySelector('body');
      
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = -10 + 'px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.width = Math.random() * 8 + 5 + 'px';
        confetti.style.height = Math.random() * 8 + 5 + 'px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        container.appendChild(confetti);
        
        // Animate confetti
        const animation = confetti.animate([
          { top: '-10px', opacity: 0, transform: 'rotate(0deg) scale(0.5)' },
          { top: Math.random() * 100 + 'vh', opacity: 1, transform: 'rotate(' + (Math.random() * 360) + 'deg) scale(1)' },
          { top: '100vh', opacity: 0, transform: 'rotate(' + (Math.random() * 720) + 'deg) scale(0.5)' }
        ], {
          duration: 2000 + Math.random() * 3000,
          easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
        });
        
        animation.onfinish = () => confetti.remove();
      }
    }

    async function sendVerification() {
      const email = document.getElementById('emailInput').value;
      const message = document.getElementById('message');
      const button = document.querySelector('.auth-btn');
      const inputContainer = document.getElementById('emailInput').parentElement;
      const checkIcon = inputContainer.querySelector('.fa-check-circle');

      // Clear previous messages
      message.textContent = '';
      message.className = 'text-sm text-center min-h-6 transition-all duration-300';

      if (!email) {
        message.textContent = "Please enter your email address";
        message.className += ' error-message animate__animated animate__headShake';
        inputContainer.classList.add('animate__animated', 'animate__shakeX');
        setTimeout(() => {
          inputContainer.classList.remove('animate__animated', 'animate__shakeX');
        }, 1000);
        return;
      }

      // Validate email format
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        message.textContent = "Please enter a valid email address";
        message.className += ' error-message animate__animated animate__headShake';
        inputContainer.classList.add('animate__animated', 'animate__shakeX');
        setTimeout(() => {
          inputContainer.classList.remove('animate__animated', 'animate__shakeX');
        }, 1000);
        return;
      }

      try {
        // Show loading state
        button.disabled = true;
        button.classList.remove('pulse');
        button.innerHTML = `
          <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Sending...</span>
        `;

        const response = await fetch('http://localhost:5000/api/auth/send-verification-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
          message.textContent = data.message || "Verification sent successfully! Please check your email.";
          message.className += ' success-message animate__animated animate__fadeIn';
          
          // Show success checkmark
          checkIcon.parentElement.classList.add('opacity-100');
          checkIcon.classList.add('text-green-500', 'animate__animated', 'animate__bounceIn');
          
          // Add celebration effects
          button.classList.add('animate__animated', 'animate__tada');
          createConfetti();
          
          setTimeout(() => {
            button.classList.remove('animate__animated', 'animate__tada');
          }, 1000);
        } else {
          message.textContent = data.message || "Failed to send verification link. Please try again.";
          message.className += ' error-message animate__animated animate__headShake';
        }
      } catch (err) {
        console.error(err);
        message.textContent = "Something went wrong. Please try again later.";
        message.className += ' error-message animate__animated animate__headShake';
      } finally {
        button.disabled = false;
        button.classList.add('pulse');
        button.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
          </svg>
          <span>Send Verification Link</span>
        `;
      }
    }

    // Add animation when input is focused
    document.getElementById('emailInput').addEventListener('focus', function() {
      this.parentElement.classList.add('animate__animated', 'animate__pulse');
      this.parentElement.querySelector('.fa-envelope').classList.add('text-purple-500');
    });
    
    document.getElementById('emailInput').addEventListener('blur', function() {
      this.parentElement.classList.remove('animate__animated', 'animate__pulse');
      this.parentElement.querySelector('.fa-envelope').classList.remove('text-purple-500');
    });

    // Add input validation feedback
    document.getElementById('emailInput').addEventListener('input', function() {
      const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
      const icon = this.parentElement.querySelector('.fa-check-circle');
      
      if (this.value.length > 0) {
        if (isValid) {
          icon.classList.remove('text-red-500');
          icon.classList.add('text-green-500');
          icon.parentElement.classList.add('opacity-100');
        } else {
          icon.classList.remove('text-green-500');
          icon.classList.add('text-red-500');
          icon.parentElement.classList.add('opacity-100');
        }
      } else {
        icon.parentElement.classList.remove('opacity-100');
      }
    });
  </script>
</body>
</html>
