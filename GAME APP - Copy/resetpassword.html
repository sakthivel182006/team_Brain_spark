<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      background: #8e44ad;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>Reset Password</h3>
  <form id="resetForm">
    <input type="password" id="password" placeholder="Enter new password" required />
    <button type="submit">Update Password</button>
  </form>
  <p id="message"></p>
</div>

<script>
const BACKEND_URL = "http://localhost:5000";

// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  if (!token) {
    message.innerText = "Invalid reset link";
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/api/reset-password/${token}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password })
    });

    const data = await res.json();

    if (res.ok) {
      message.style.color = "green";
      message.innerText = "Password updated successfully!";
    } else {
      message.style.color = "red";
      message.innerText = data.message || "Error updating password";
    }

  } catch (err) {
    message.style.color = "red";
    message.innerText = "Network error";
  }
});
</script>

</body>
</html>
